<!DOCTYPE html>
<html>
<head>
    <title>Sorting Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game">
    <h1>Sorting Game</h1>
    
    <div class="buttons">
        <button id="bubbleBtn" class="active">Bubble Sort</button>
        <button id="quickBtn">Quick Sort</button>
    </div>
    
    <p>Score: <span id="score">0</span></p>
    <p id="message">Click YES or NO to swap the yellow boxes</p>
    
    <div id="array"></div>
    
    <div class="controls">
        <button id="yesBtn">YES - Swap</button>
        <button id="noBtn">NO - Don't swap</button>
        <button id="resetBtn">New Array</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
