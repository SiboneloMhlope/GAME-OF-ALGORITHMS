<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bubble Sort Master</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background"></div>

<div class="container">
    <h1>🫧 Bubble Sort Master</h1>

    <div class="hud">
        <p>Score: <span id="score">0</span></p>
        <p>Level: <span id="level">1</span></p>
        <p>Time: <span id="time">30</span></p>
    </div>

    <div id="game"></div>

    <div class="controls">
        <button onclick="startGame()">Start</button>
        <button onclick="toggleLevels()">📚 Levels</button>
        <button onclick="showHint()">💡 Hint</button>
        <button onclick="toggleMusic()">🎵 Music</button>
    </div>

    <div id="message"></div>

    <div id="levelsPage"></div>
</div>

<div id="leaderboardContainer">
    <h3>🏆 Top Scores</h3>
    <ul id="leaderboard"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
